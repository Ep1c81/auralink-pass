<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Link Digital | Premium Digital Pass</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            deep: '#0B0F19',
                            slate: '#1E293B',
                            accent: '#38BDF8',
                            purple: '#A855F7',
                            glow: '#6366F1'
                        }
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glow-effect {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.15;
        }
    </style>
</head>
<body class="min-h-full flex flex-col items-center justify-center p-4 md:p-8 relative overflow-x-hidden bg-slate-950">

    <!-- Ambient Glowing Backgrounds -->
    <div class="glow-effect w-[300px] h-[300px] bg-brand-accent top-[-10%] left-[-10%]"></div>
    <div class="glow-effect w-[400px] h-[400px] bg-brand-purple bottom-[-10%] right-[-10%]"></div>
    <div class="glow-effect w-[350px] h-[350px] bg-brand-glow top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>

    <!-- Main Card Container -->
    <div class="w-full max-w-md glass-panel rounded-3xl p-6 md:p-8 shadow-2xl relative z-10 transition-all duration-500 hover:shadow-brand-accent/5">
        
        <!-- Header / Logo Area -->
        <div class="flex flex-col items-center text-center mb-6">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-brand-accent via-brand-glow to-brand-purple p-0.5 shadow-lg shadow-brand-accent/20 mb-4">
                <div class="w-full h-full bg-brand-deep rounded-[14px] flex items-center justify-center">
                    <!-- Modern Minimalist Logo Emblem -->
                    <span class="text-2xl font-black bg-gradient-to-r from-brand-accent to-brand-purple bg-clip-text text-transparent">A</span>
                </div>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">
                Aura Link Digital
            </h1>
            <p class="text-xs uppercase tracking-[0.2em] text-brand-accent font-semibold mt-1">
                Digital Marketing & Neuromarketing
            </p>
        </div>

        <!-- Divider -->
        <div class="h-px w-full bg-gradient-to-r from-transparent via-slate-800 to-transparent mb-6"></div>

        <!-- QR Code Section -->
        <div class="flex flex-col items-center mb-8">
            <div class="relative p-4 bg-white rounded-2xl shadow-xl shadow-black/40 transition-transform duration-300 hover:scale-[1.02]">
                <!-- Dynamic High-Quality QR Code API pointing to auralinkdigital.com -->
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://auralinkdigital.com&color=0f172a&bgcolor=ffffff&qzone=1" 
                     alt="QR Code Link to auralinkdigital.com" 
                     class="w-48 h-48 rounded-lg"
                     loading="lazy">
                
                <!-- Mini Logo Center Overlay -->
                <div class="absolute inset-0 m-auto w-10 h-10 bg-white rounded-lg p-0.5 flex items-center justify-center shadow-md border border-slate-100">
                    <div class="w-full h-full bg-gradient-to-tr from-brand-accent to-brand-purple rounded-md flex items-center justify-center text-white font-bold text-sm">
                        A
                    </div>
                </div>
            </div>
            <p class="text-xs text-slate-400 mt-4 flex items-center gap-2">
                <i class="fa-solid fa-qrcode text-brand-accent"></i>
                Scan code to visit our website
            </p>
        </div>

        <!-- Quick Info / Social Links -->
        <div class="space-y-3 mb-8">
            <a href="https://auralinkdigital.com" target="_blank" rel="noopener noreferrer" class="flex items-center gap-4 p-3.5 rounded-xl bg-slate-900/50 hover:bg-slate-900 border border-slate-800/40 hover:border-slate-700/60 transition-all group">
                <div class="w-10 h-10 rounded-lg bg-brand-accent/10 flex items-center justify-center text-brand-accent group-hover:scale-110 transition-transform">
                    <i class="fa-solid fa-globe"></i>
                </div>
                <div class="text-left">
                    <div class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">Official Website</div>
                    <div class="text-sm font-medium text-slate-200 group-hover:text-brand-accent transition-colors">auralinkdigital.com</div>
                </div>
                <i class="fa-solid fa-chevron-right ml-auto text-slate-600 text-xs transition-transform group-hover:translate-x-1"></i>
            </a>

            <div class="flex items-center gap-4 p-3.5 rounded-xl bg-slate-900/50 border border-slate-800/40">
                <div class="w-10 h-10 rounded-lg bg-brand-purple/10 flex items-center justify-center text-brand-purple">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <div class="text-left">
                    <div class="text-[10px] text-slate-500 font-semibold uppercase tracking-wider">Specialization</div>
                    <div class="text-sm font-medium text-slate-200">High-Tech Neuromarketing</div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="grid grid-cols-2 gap-3">
            <button onclick="shareCard()" class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-slate-900 hover:bg-slate-850 border border-slate-800 text-sm font-semibold transition-all text-slate-200">
                <i class="fa-solid fa-share-nodes text-slate-400"></i> Share Link
            </button>
            <a href="https://auralinkdigital.com" target="_blank" rel="noopener noreferrer" class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-gradient-to-r from-brand-accent to-brand-glow text-slate-950 font-bold text-sm shadow-lg shadow-brand-accent/10 hover:shadow-brand-accent/25 transition-all hover:opacity-95">
                Visit Site <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
            </a>
        </div>

        <!-- Save Indicator -->
        <div class="mt-6 text-center">
            <span class="text-[11px] text-slate-500">
                Tip: Add to home screen or screenshot to save to your photo library.
            </span>
        </div>

    </div>

    <!-- Footer Copyright -->
    <p class="mt-8 text-xs text-slate-600 tracking-wider">
        &copy; 2026 Aura Link Digital. All rights reserved.
    </p>

    <!-- Interactive JS Functionality -->
    <script>
        async function shareCard() {
            const shareData = {
                title: 'Aura Link Digital',
                text: 'Discover Aura Link Digital - Premium High-Tech Neuromarketing & Media.',
                url: 'https://auralinkdigital.com'
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    // Fallback to copying to clipboard
                    await navigator.clipboard.writeText('https://auralinkdigital.com');
                    alert('Website URL copied to clipboard!');
                }
            } catch (err) {
                console.error('Error sharing:', err);
            }
        }
    </script>
</body>
</html>
